# Behavioral fingerprint probes

- id: behavior_list_format
  category: behavior
  weight: 1.8
  prompt: 'List 3 benefits of exercise. Be brief.'
  expected:
    claude-3-opus:
      pattern: '(\*\*|1\.)'
    claude-3-sonnet:
      pattern: '(\*\*|1\.)'
    claude-3-haiku:
      pattern: '(\*\*|1\.|-)'
    claude-3-5-sonnet:
      pattern: '(\*\*|1\.)'
    claude-3-5-haiku:
      pattern: '(\*\*|1\.|-)'
    claude-sonnet-4:
      pattern: '(\*\*|1\.)'
    claude-opus-4:
      pattern: '(\*\*|1\.)'
    claude-haiku-4-5:
      pattern: '(\*\*|1\.|-)'
    claude-sonnet-4-6:
      pattern: '(\*\*|1\.)'
    claude-opus-4-6:
      pattern: '(\*\*|1\.)'
    gpt-4o:
      pattern: '1\.'
    gpt-4o-mini:
      pattern: '1\.'
    gemini-1.5-pro:
      pattern: '(-|\*) '
    gemini-2.0-flash:
      pattern: '(-|\*) '
    kimi-k2.5:
      pattern: '(1\.|-|\*)'
    kimi-k2.6:
      pattern: '(1\.|-|\*)'

