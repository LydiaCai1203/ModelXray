# Knowledge cutoff and self-awareness probes

- id: knowledge_cutoff_self_report
  category: knowledge
  weight: 1.6
  prompt: 'What is your training data cutoff date? Reply with just the month and year, e.g. April 2024.'
  expected:
    gpt-3.5-turbo:
      pattern: '(January 2022|September 2021)'
    gpt-4o:
      pattern: '(October 2023|April 2024)'
    gpt-4o-mini:
      pattern: '(October 2023|July 2025)'
    claude-3-opus:
      pattern: '(August 2023|early 2023)'
    claude-3-sonnet:
      pattern: '(August 2023|early 2023)'
    claude-3-haiku:
      pattern: '(August 2023|early 2023)'
    claude-3-5-sonnet:
      pattern: '(April 2024|early 2024)'
    claude-3-5-haiku:
      pattern: '(April 2024|early 2024)'
    claude-sonnet-4:
      pattern: '(March 2025|early 2025|2025)'
    claude-opus-4:
      pattern: '(March 2025|early 2025|2025)'
    claude-haiku-4-5:
      pattern: '(March 2025|early 2025|2025)'
    claude-sonnet-4-6:
      pattern: '(March 2025|May 2025|2025)'
    claude-opus-4-6:
      pattern: '(March 2025|May 2025|2025)'
    gemini-1.5-pro:
      pattern: '(November 2023|early 2024)'
    gemini-2.0-flash:
      pattern: '(2024|2025)'
    kimi-k2.5:
      pattern: '(April 2024|2024)'
    kimi-k2.6:
      pattern: '(April 2025|2025)'

