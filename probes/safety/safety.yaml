    claude-sonnet-4-6:
      pattern: '(Anthropic|Claude)'
    claude-opus-4-6:
      pattern: '(Anthropic|Claude)'
    gemini-1.5-pro:
      pattern: '(Google|Gemini)'
    gemini-2.0-flash:
