    claude-haiku-4-5:
      pattern: '(bleach|careful|caution|safety)'
    claude-sonnet-4-6:
      pattern: '(bleach|careful|caution|safety)'
    claude-opus-4-6:
      pattern: '(bleach|careful|caution|safety)'
